domain_id: execution_validation
normative: NORMATIVE.md
verification: VERIFICATION.md
items:
  - id: EXE-001
    section: "7.4"
    summary: "validate_execution API"
    status: implemented
    spec_ref: "SPEC Section 7.4"
    tests:
      - tests/test_exe_001_validate_execution_api.rs
    notes: "L2Block::validate_execution(&self, &ValidationConfig, &Bytes32) -> Result<ExecutionResult, BlockError>; block-order bundle loop (no-op until EXE-003); block-level EXE-006 fee consistency + EXE-007 cost consistency. Full CLVM execution / condition parsing / BLS verify deferred to EXE-003/004/005."

  - id: EXE-002
    section: "7.4.2"
    summary: "Puzzle Hash Verification"
    status: implemented
    spec_ref: "SPEC Section 7.4.2"
    tests:
      - tests/test_exe_002_puzzle_hash_verification.rs
    notes: "verify_coin_spend_puzzle_hash helper uses clvm_utils::tree_hash_from_bytes; PuzzleHashMismatch carries coin_id/expected/computed; wired into L2Block::validate_execution before CLVM (fail-fast). Chia parity: Check 20 WRONG_PUZZLE_HASH."

  - id: EXE-003
    section: "7.4.3"
    summary: "CLVM Execution via dig-clvm"
    status: implemented
    spec_ref: "SPEC Section 7.4.3"
    tests:
      - tests/test_exe_003_clvm_delegation.rs
    notes: "map_clvm_validation_error maps 8 ValidationError variants to BlockError (puzzle hash, signature, cost, conservation, coin-not-found, already-spent, double-spend, CLVM, Driver). L2Block::validate_execution_with_context delegates to dig_clvm::validate_spend_bundle per bundle after EXE-002 puzzle-hash pre-check; aggregates additions/removals/cost/fees. Architectural boundary lint: src/ has no direct calls to chia-consensus CLVM entrypoints (run_spendbundle, validate_clvm_and_signature, spendbundle_conditions). Merkle set roots via chia-consensus remain allowed per HSH-004/005."

  - id: EXE-004
    section: "7.4.4"
    summary: "Condition Parsing and Assertion Checking"
    status: implemented
    spec_ref: "SPEC Section 7.4.4"
    tests:
      - tests/test_exe_004_condition_parsing.rs
    notes: "Pass 1 (create-coin / announcements / reserve-fee collection) and Pass 2 (announcement / concurrent-spend / self-assertion checks) execute inside dig-clvm (via chia-consensus::run_spendbundle). Height/time ASSERT_* / ASSERT_BEFORE_* are deferred to Tier-3 via collect_pending_assertions_from_conditions helper walking OwnedSpendBundleConditions; wired into validate_execution_with_context. ASSERT_EPHEMERAL handled directly by STV-002 (spend flags + ExecutionResult.additions check)."

  - id: EXE-005
    section: "7.4.5"
    summary: "BLS Aggregate Signature Verification"
    status: gap
    spec_ref: "SPEC Section 7.4.5"
    tests: []
    notes: ""

  - id: EXE-006
    section: "7.4.6"
    summary: "Coin Conservation and Fee Consistency"
    status: gap
    spec_ref: "SPEC Section 7.4.6"
    tests: []
    notes: ""

  - id: EXE-007
    section: "7.4.6"
    summary: "Cost Consistency Verification"
    status: gap
    spec_ref: "SPEC Section 7.4.6"
    tests: []
    notes: ""

  - id: EXE-008
    section: "7.4.7"
    summary: "ExecutionResult Output Type"
    status: implemented
    spec_ref: "SPEC Section 7.4.7"
    tests:
      - tests/test_exe_008_execution_result.rs
    notes: "Six public fields (additions: Vec<Coin>, removals: Vec<Bytes32>, pending_assertions: Vec<PendingAssertion>, total_cost: Cost, total_fees: u64, receipts: Vec<Receipt>); Default + PartialEq + serde; Tier-2 -> Tier-3 bridge shape."

  - id: EXE-009
    section: "7.4.4, 7.4.7, 7.5.4"
    summary: "PendingAssertion Type Definition"
    status: implemented
    spec_ref: "SPEC Sections 7.4.4, 7.4.7, 7.5.4"
    tests:
      - tests/test_exe_009_pending_assertion.rs
    notes: "AssertionKind enum (8 height/time variants); PendingAssertion { kind, coin_id }; from_condition factory maps chia-sdk-types::Condition variants; None for CREATE_COIN and ASSERT_EPHEMERAL (latter handled separately in EXE-004); bincode serde."
