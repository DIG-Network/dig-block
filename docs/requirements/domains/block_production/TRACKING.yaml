domain_id: block_production
normative: NORMATIVE.md
verification: VERIFICATION.md
items:
  - id: BLD-001
    section: "6.1, 6.2"
    summary: BlockBuilder Struct and Constructor
    status: implemented
    spec_ref: specs/BLD-001.md
    tests:
      - tests/test_bld_001_builder_struct_constructor.rs
    notes: >
      BlockBuilder: 12 public fields per SPEC §6.1; new(height, epoch, parent_hash, l1_height, l1_hash, proposer_index)
      clears spend_bundles, slash_proposal_payloads, additions, removals and zeros total_cost/total_fees.
      removals use Vec<Bytes32> (NORMATIVE CoinId ≡ coin_id bytes; no CoinId type in pinned chia-protocol).

  - id: BLD-002
    section: "6.3"
    summary: add_spend_bundle with Budget Enforcement
    status: implemented
    spec_ref: specs/BLD-002.md
    tests:
      - tests/test_bld_002_add_spend_bundle_budget.rs
    notes: >
      Enforces cost and size budgets; extracts additions/removals;
      updates running totals; remaining_cost() returns budget remainder.

  - id: BLD-003
    section: "6.3"
    summary: add_slash_proposal with Limits
    status: implemented
    spec_ref: specs/BLD-003.md
    tests:
      - tests/test_bld_003_add_slash_proposal_limits.rs
    notes: >
      Enforces count and payload size limits for slash proposals.

  - id: BLD-004
    section: "6.3"
    summary: Optional Setters
    status: implemented
    spec_ref: specs/BLD-004.md
    tests:
      - tests/test_bld_004_optional_setters.rs
    notes: >
      set_l1_proofs / set_dfsp_roots / set_extension_data on public BlockBuilder fields matching L2BlockHeader;
      BLD-002 size probe merges these into probe header (Option discriminant + roots).

  - id: BLD-005
    section: "6.4"
    summary: Build Pipeline
    status: implemented
    spec_ref: specs/BLD-005.md
    tests:
      - tests/test_bld_005_build_pipeline.rs
    notes: >
      build / build_with_dfsp_activation: Merkle roots + filter from public compute_* helpers,
      counts, BLK-007 version + MissingDfspRoots for V2+all-EMPTY, wall-clock timestamp, two-pass block_size,
      BlockSigner integration, EmptyBlock when no spends. Integration tests assert body-derived roots,
      validate_structure Ok, and signer error mapping.

  - id: BLD-006
    section: "6.4 Step 6"
    summary: BlockSigner Trait Integration
    status: Not Started
    spec_ref: specs/BLD-006.md
    tests: []
    notes: >
      Calls signer.sign_block() and maps failure to BuilderError::SigningFailed.

  - id: BLD-007
    section: "1.1, 12.2"
    summary: Builder Structural Validity Guarantee
    status: Not Started
    spec_ref: specs/BLD-007.md
    tests: []
    notes: >
      Any block produced by build() must pass validate_structure().
      Embodies the "build correct, validate everything" design principle.
