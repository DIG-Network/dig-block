domain_id: structural_validation
normative: NORMATIVE.md
verification: VERIFICATION.md
items:
  - id: SVL-001
    section: "5.1 Step 1"
    summary: Header Version Check
    status: implemented
    spec_ref: specs/SVL-001.md
    tests:
      - tests/test_svl_001_header_version_check.rs
    notes: >
      L2BlockHeader::validate / validate_with_dfsp_activation; BlockError::InvalidVersion { expected, actual };
      BLK-007 protocol_version_for_height_with_activation.

  - id: SVL-002
    section: "5.1 Step 2"
    summary: Header DFSP Root Pre-Activation Check
    status: implemented
    spec_ref: specs/SVL-002.md
    tests:
      - tests/test_svl_002_dfsp_root_pre_activation.rs
    notes: >
      L2BlockHeader::validate_with_dfsp_activation: when height < dfsp_activation_height, all five DFSP roots
      must equal EMPTY_ROOT; else BlockError::InvalidData (fixed message). Chained after SVL-001 version check.

  - id: SVL-003
    section: "5.1 Steps 3-4"
    summary: Header Cost and Size Checks
    status: implemented
    spec_ref: specs/SVL-003.md
    tests:
      - tests/test_svl_003_cost_and_size_checks.rs
    notes: >
      L2BlockHeader::validate_with_dfsp_activation after SVL-002: CostExceeded when total_cost > MAX_COST_PER_BLOCK;
      TooLarge when block_size > MAX_BLOCK_SIZE (cost checked first). Chained from validate().

  - id: SVL-004
    section: "5.1 Step 5"
    summary: Header Timestamp Future Bound
    status: implemented
    spec_ref: specs/SVL-004.md
    tests:
      - tests/test_svl_004_timestamp_future_bound.rs
    notes: >
      L2BlockHeader::validate_with_dfsp_activation samples wall clock then delegates to
      validate_with_dfsp_activation_at_unix(dfsp, now_secs) which enforces SVL-001..004.
      TimestampTooFarInFuture when timestamp > now_secs + MAX_FUTURE_TIMESTAMP_SECONDS (strict >).
      validate_with_dfsp_activation_at_unix is the deterministic test hook per SVL-004 spec.

  - id: SVL-005
    section: "5.2 Steps 2, 4, 5, 13"
    summary: Block Count Agreement
    status: implemented
    spec_ref: specs/SVL-005.md
    tests:
      - tests/test_svl_005_block_count_agreement.rs
    notes: >
      L2Block::validate_structure: spend_bundle_count vs len; additions_count vs all_additions().len();
      removals_count vs sum of coin_spends per bundle; slash_proposal_count vs slash_proposal_payloads.len().
      SVL-006 extends validate_structure with Merkle/integrity. BlockError count mismatches carry {header, actual}.

  - id: SVL-006
    section: "5.2 Steps 3, 6-15"
    summary: Block Merkle Root and Integrity Checks
    status: Not Started
    spec_ref: specs/SVL-006.md
    tests: []
    notes: >
      Ten sub-checks covering Merkle roots, duplicate outputs,
      double spends, slash proposal limits, filter hash, and size.
