domain_id: state_validation
normative: NORMATIVE.md
verification: VERIFICATION.md
items:
  - id: STV-001
    section: "7.5"
    summary: "validate_state API"
    status: implemented
    spec_ref: "SPEC Section 7.5"
    tests:
      - tests/test_stv_001_validate_state_api.rs
    notes: "L2Block::validate_state(&self, &ExecutionResult, &dyn CoinLookup, &PublicKey) -> Result<Bytes32, BlockError> dispatcher calling stub sub-checks (STV-002..007 tighten them). L2Block::validate_full chains Tier 1 -> Tier 2 -> Tier 3 with short-circuit on failure. Empty-block path returns header.state_root; object-safe via &dyn CoinLookup."

  - id: STV-002
    section: "7.5.1"
    summary: "Coin Existence Checks"
    status: implemented
    spec_ref: "SPEC Section 7.5.1"
    tests:
      - tests/test_stv_002_coin_existence.rs
    notes: "Per removal: CoinLookup.get_coin_state -> (Some with spent_height set) CoinAlreadySpent; (None, not in exec.additions) CoinNotFound; (None, in exec.additions) passes (ephemeral). Ephemeral set built once as HashSet<Bytes32> for O(n+m). Chia parity Check 15 UNKNOWN_UNSPENT / DOUBLE_SPEND."

  - id: STV-003
    section: "7.5.2"
    summary: "Puzzle Hash Cross-Check"
    status: implemented
    spec_ref: "SPEC Section 7.5.2"
    tests:
      - tests/test_stv_003_puzzle_hash_cross_check.rs
    notes: "Per CoinSpend: CoinLookup entry's coin.puzzle_hash must equal CoinSpend.coin.puzzle_hash, else PuzzleHashMismatch{coin_id, expected=state, computed=declared}. Ephemeral coins (get_coin_state=None) skipped — STV-002 handles existence. Complementary to EXE-002 (which proves tree_hash(puzzle_reveal) == CoinSpend.puzzle_hash). Chia parity Check 20."

  - id: STV-004
    section: "7.5.3"
    summary: "Addition Non-Existence"
    status: implemented
    spec_ref: "SPEC Section 7.5.3"
    tests:
      - tests/test_stv_004_addition_uniqueness.rs
    notes: "Per addition: CoinLookup.get_coin_state=Some AND coin_id not in exec.removals -> CoinAlreadyExists. Ephemeral exception (id in both additions and removals) passes even when a persistent entry exists. O(n+m) with HashSet-backed ephemeral check."

  - id: STV-005
    section: "7.5.4"
    summary: "Height/Time Lock Evaluation"
    status: implemented
    spec_ref: "SPEC Section 7.5.4"
    tests:
      - tests/test_stv_005_height_time_locks.rs
    notes: "All 8 PendingAssertion variants evaluated against CoinLookup chain_height/chain_timestamp. Relative-height uses coin.created_height. Relative-seconds estimated from (chain_ts - delta_blocks * AVG_BLOCK_SECONDS=10) since chia-protocol CoinState has no per-coin timestamp. Failed -> AssertionFailed{condition,reason}. Missing relative coin -> CoinNotFound. Chia parity Check 21."

  - id: STV-006
    section: "7.5.5"
    summary: "Proposer Signature Verification"
    status: implemented
    spec_ref: "SPEC Section 7.5.5"
    tests:
      - tests/test_stv_006_proposer_signature.rs
    notes: "chia_bls::verify(proposer_signature, pubkey, header.hash()) inside validate_state; InvalidProposerSignature on failure. EXE-005 BLS lint only forbids aggregate_verify / BlsCache / chia_bls::sign — chia_bls::verify (scalar) is allowed. Shared STV test helpers stv_test_proposer_keypair / stv_sign_proposer in tests/common.rs align signed blocks with CoinLookup-free state tests."

  - id: STV-007
    section: "7.5.6"
    summary: "State Root Verification"
    status: gap
    spec_ref: "SPEC Section 7.5.6"
    tests: []
    notes: ""
