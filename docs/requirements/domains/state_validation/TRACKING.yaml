    notes: "L2Block::validate_state(&self, &ExecutionResult, &dyn CoinLookup, &PublicKey) -> Result<Bytes32, BlockError> dispatcher calling stub sub-checks (STV-002..007 tighten them). L2Block::validate_full chains Tier 1 -> Tier 2 -> Tier 3 with short-circuit on failure. Empty-block path returns header.state_root; object-safe via &dyn CoinLookup."

