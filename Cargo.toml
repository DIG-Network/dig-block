[package]
name = "dig-block"
version = "0.1.0"
edition = "2021"
rust-version = "1.75.0"
description = "DIG L2 block format, production, and validation"
license = "MIT"
authors = ["DIG Network"]
repository = "https://github.com/DIG-Network/dig-block"

[lib]
path = "src/lib.rs"

[dependencies]
# Chia protocol & consensus
chia-protocol = "0.26"
chia-bls = "0.26"
chia-consensus = "0.26"
chia-sha2 = "0.26"
chia-traits = "0.26"
clvm-utils = "0.26"
clvmr = "0.14"

# Chia SDK
chia-sdk-types = "0.30"
chia-sdk-signer = "0.30"

# DIG ecosystem
dig-clvm = "0.1"

# Serialization
bincode = "1"
serde = { version = "1", features = ["derive"] }

# Merkle / BIP158 (BLK-004): Bitcoin-compatible GCS filter writer, ordered puzzle_hash groups
bitcoin = { version = "0.32", default-features = false, features = ["std"] }
indexmap = "2"

# Error handling
thiserror = "2"

[dev-dependencies]
bincode = "1"
chia-sha2 = "0.26"
hex = "0.4.3"
hex-literal = "0.4"

# BLK-005: dedicated integration test crate (nested path; see spec test plan).
[[test]]
name = "blk_005_protocol_constants"
path = "tests/block_types/test_protocol_constants.rs"

# BLK-006: primitive types & re-exports.
[[test]]
name = "blk_006_primitive_types"
path = "tests/block_types/test_primitive_types.rs"

# BLK-001: L2BlockHeader struct & derives.
[[test]]
name = "blk_001_l2_block_header_struct"
path = "tests/block_types/test_l2_block_header_struct.rs"

# BLK-002: L2BlockHeader constructors.
[[test]]
name = "blk_002_l2_block_header_constructors"
path = "tests/block_types/test_l2_block_header_constructors.rs"

# BLK-007: version auto-detection.
[[test]]
name = "blk_007_version_auto_detection"
path = "tests/block_types/test_version_auto_detection.rs"

# BLK-003: L2Block struct (header + body + signature).
[[test]]
name = "blk_003_l2_block_struct"
path = "tests/block_types/test_l2_block_struct.rs"

# BLK-004: L2Block helper methods (Merkle roots, filter, integrity).
[[test]]
name = "blk_004_l2_block_helpers"
path = "tests/block_types/test_l2_block_helpers.rs"

# ATT-003: BlockStatus enum and predicates.
[[test]]
name = "att_003_block_status"
path = "tests/attestation/test_block_status.rs"

# ATT-004: SignerBitmap core methods.
[[test]]
